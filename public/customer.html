<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menü – Sipariş Ekranı</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-color: #0A0A0A;
    --gold: #D4AF37;
    --gold-dark: #B8860B;
    --card-bg: #1C1C1E;
    --text-white: #FFFFFF;
    --text-grey: #8E8E93;
    --border: #333333;
    --brown-bg: #2A1F0D;
    
    --radius: 16px;
    --shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    --gold-glow: 0 0 20px rgba(212, 175, 55, 0.2);
    
    --sidebar-width: 380px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-white);
    min-height: 100vh;
    display: flex;
    overflow: hidden; /* Desktop app feel */
  }

  /* Main Layout */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  header {
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(10px);
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  
  .header-left {
    display: flex; align-items: center; gap: 20px;
  }
  
  .back-btn {
    width: 44px; height: 44px; border-radius: 12px;
    background: #1C1C1E; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; color: var(--text-grey);
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--gold); color: var(--gold); }
  .back-btn svg { width: 20px; height: 20px; fill: currentColor; }
  
  .header-title { display: flex; flex-direction: column; }
  .header-title h1 { font-size: 1.6rem; font-weight: 800; color: var(--gold); margin: 0; letter-spacing: 1px; }
  .header-title p { font-size: 0.9rem; color: var(--text-grey); font-weight: 500; }
  
  .header-right {
    display: flex; align-items: center; gap: 15px;
  }
  
  .table-badge {
    padding: 10px 20px; border-radius: 12px;
    background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold-dark);
    color: var(--gold); font-weight: 700; font-size: 1rem;
    display: flex; align-items: center; gap: 8px;
  }

  .call-btn-brown {
    padding: 10px 24px; border-radius: 12px; border: 1px solid var(--gold-dark);
    background: var(--brown-bg); color: var(--gold); cursor: pointer;
    font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
    transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
  }
  .call-btn-brown:hover { background: #3d2b10; transform: translateY(-2px); }
  .call-btn-brown.called { opacity: 0.7; pointer-events: none; }

  /* Scrollable Content Area */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 30px 40px;
  }

  /* Categories */
  .cat-scroll {
    display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; margin-bottom: 20px; scrollbar-width: none;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0; padding: 12px 24px; border-radius: 24px;
    border: 1px solid var(--border); background: var(--card-bg); color: var(--text-grey);
    cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 600;
    transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
  }
  .cat-btn.active {
    border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1);
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
  }
  .cat-btn:hover:not(.active) { border-color: #666; color: #fff; }
  .cat-icon { font-size: 1.2rem; }

  /* Menu */
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px;
  }
  .section-title {
    font-size: 1.8rem; font-weight: 800; color: #fff;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title span { color: var(--gold); }
  .section-count { font-size: 1rem; color: var(--text-grey); font-weight: 600; background: #1C1C1E; padding: 4px 12px; border-radius: 12px; border: 1px solid var(--border); }
  
  .menu-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
    padding-bottom: 40px;
  }

  .food-card {
    background: var(--card-bg); border-radius: var(--radius);
    overflow: hidden; border: 1px solid var(--border);
    display: flex; flex-direction: column; transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .food-card:hover { border-color: var(--gold-dark); transform: translateY(-5px); box-shadow: var(--gold-glow); }
  .food-img { width: 100%; height: 220px; object-fit: cover; }
  
  .food-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
  .food-name { font-weight: 700; font-size: 1.2rem; color: #fff; margin-bottom: 8px; }
  .food-desc { font-size: 0.9rem; color: var(--text-grey); font-weight: 500; line-height: 1.5; margin-bottom: 25px; flex-grow: 1; }
  .food-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .food-price { font-weight: 800; font-size: 1.4rem; color: var(--gold); }
  .add-btn {
    width: 44px; height: 44px; border-radius: 12px; border: none;
    background: var(--gold); color: #0A0A0A; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
  }
  .add-btn svg { width: 22px; height: 22px; fill: currentColor; }
  .add-btn:hover { background: #FFD700; transform: scale(1.05); }

  /* Desktop Sidebar Cart */
  .cart-sidebar {
    width: var(--sidebar-width);
    background: var(--card-bg);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    box-shadow: -5px 0 25px rgba(0,0,0,0.5);
  }

  .cart-header {
    padding: 25px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .cart-title { font-size: 1.4rem; font-weight: 800; color: var(--gold); display: flex; align-items: center; gap: 10px; }
  
  .cart-items-container {
    flex: 1; overflow-y: auto; padding: 20px 25px;
  }
  
  .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 600; font-size: 1.05rem; color: #fff; margin-bottom: 4px; }
  .cart-item-note { font-size: 0.85rem; color: var(--gold-dark); font-style: italic; }
  
  .qty-ctrl { display: flex; align-items: center; gap: 12px; background: #0A0A0A; border-radius: 8px; padding: 6px 12px; margin: 0 15px; border: 1px solid var(--border); }
  .qty-ctrl button { background: none; border: none; color: var(--gold); font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: color 0.2s; }
  .qty-ctrl button:hover { color: #FFF; }
  .qty-ctrl span { font-weight: 700; font-size: 1rem; color: #FFF; width: 20px; text-align: center; }
  
  .item-price { font-weight: 800; min-width: 70px; text-align: right; color: var(--gold); font-size: 1.1rem; }

  .cart-footer {
    padding: 25px; background: #0A0A0A; border-top: 1px solid var(--border);
  }
  .cart-total-row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
  }
  .cart-total-label { font-size: 1.2rem; color: var(--text-grey); font-weight: 600; }
  .cart-total-value { font-size: 1.8rem; font-weight: 900; color: var(--gold); }
  
  .checkout-btn {
    width: 100%; padding: 16px; background: var(--gold); color: #0A0A0A; border: none;
    border-radius: 12px; font-weight: 800; font-size: 1.1rem; font-family: 'Poppins', sans-serif;
    cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
  }
  .checkout-btn:hover { background: #FFD700; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); transform: translateY(-2px); }
  .checkout-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }

  /* Modals */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.open { display: flex; }
  
  .modal {
    background: var(--card-bg); border-radius: 20px; width: 100%; max-width: 500px;
    border: 1px solid var(--border); overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative;
  }
  .modal-inner { padding: 40px; text-align: center; }
  
  /* Table Modal Styles */
  .table-modal { border-color: var(--gold); box-shadow: 0 0 40px rgba(212, 175, 55, 0.15); }
  .table-modal .icon-wrapper { margin-bottom: 25px; color: var(--gold); }
  .table-modal h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; color: #fff; letter-spacing: 1px; }
  .table-modal p { font-size: 1rem; color: var(--text-grey); margin-bottom: 30px; font-weight: 500; }
  
  .input-group {
    border: 1px solid #444; border-radius: 14px; display: flex; align-items: center;
    padding: 16px 20px; margin-bottom: 25px; background: #0A0A0A;
  }
  .input-group svg { fill: var(--gold); width: 24px; height: 24px; margin-right: 15px; }
  .input-group input {
    background: transparent; border: none; color: #fff; font-family: 'Poppins', sans-serif;
    font-size: 1.2rem; font-weight: 700; width: 100%; outline: none;
  }
  
  .table-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 35px; }
  .table-btn {
    background: #0A0A0A; border: 1px solid #444; border-radius: 12px; padding: 15px 0;
    color: #fff; font-weight: 700; font-size: 1.2rem; cursor: pointer; font-family: 'Poppins', sans-serif;
    transition: all 0.2s;
  }
  .table-btn:hover { border-color: var(--gold); color: var(--gold); }
  .table-btn.selected { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); color: var(--gold); box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2); }
  
  .btn-gold-full {
    width: 100%; padding: 16px; background: var(--gold); color: #0A0A0A; border: none;
    border-radius: 14px; font-weight: 800; font-size: 1.1rem; font-family: 'Poppins', sans-serif;
    cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
  }
  .btn-gold-full:hover { background: #FFD700; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3); transform: translateY(-2px); }
  .btn-text {
    background: transparent; border: none; color: var(--text-grey); font-size: 1rem;
    font-weight: 600; cursor: pointer; margin-top: 20px; font-family: 'Poppins', sans-serif;
  }
  .btn-text:hover { color: #fff; }

  /* Item Modal */
  .modal-header { padding: 25px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #111; }
  .modal-title { font-weight: 800; font-size: 1.4rem; color: var(--gold); }
  .close-btn { background: #1C1C1E; border: 1px solid var(--border); width: 36px; height: 36px; border-radius: 50%; color: var(--text-grey); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .close-btn:hover { color: #fff; border-color: #fff; }
  .modal-body { padding: 30px; text-align: left; }
  
  .note-input {
    width: 100%; padding: 16px; background: #0A0A0A; border: 1px solid var(--border);
    color: #fff; font-family: 'Poppins', sans-serif; font-size: 1rem; border-radius: 14px;
    outline: none; resize: vertical; margin-bottom: 25px;
  }
  .note-input:focus { border-color: var(--gold); }

  .toast {
    position: fixed; top: 30px; right: 30px;
    background: var(--gold); color: #0A0A0A; padding: 16px 30px; border-radius: 12px;
    font-weight: 800; font-size: 1.05rem; z-index: 9999; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); transform: translateX(150%);
  }
  .toast.show { transform: translateX(0); }

  /* Responsive Adjustments for Mobile fallback */
  @media(max-width: 900px) {
    body { flex-direction: column; overflow: auto; }
    .main-content { overflow: visible; height: auto; }
    .cart-sidebar { width: 100%; height: auto; border-left: none; border-top: 2px solid var(--gold); }
    .scroll-area { padding: 20px; }
  }
</style>
</head>
<body>

<div class="main-content">
  <header>
    <div class="header-left">
      <a href="/" class="back-btn">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </a>
      <div class="header-title">
        <h1>RESTORAN</h1>
        <p>Lüks Menü Deneyimi</p>
      </div>
    </div>
    
    <div class="header-right">
      <div class="table-badge" onclick="showTableSelection()" style="cursor: pointer;" title="Masa Değiştir">
        <span>🪑</span> Masa <span id="tableDisplay">?</span>
      </div>
      <button class="call-btn-brown" id="callWaiterBtn" onclick="callWaiter()">
        <svg style="width:20px;height:20px;fill:currentColor;" viewBox="0 0 24 24"><path d="M20 12.5C20 8.36 16.64 5 12.5 5S5 8.36 5 12.5V19h15v-6.5zm-2 4.5H7v-4.5c0-3.03 2.47-5.5 5.5-5.5s5.5 2.47 5.5 5.5V17z"/><path d="M11.5 2h2v3h-2zM4.15 6.05l2.12-2.12 1.41 1.42L5.56 7.47zM18.44 7.47l-1.41-1.42 2.12-2.12 1.41 1.42z"/></svg>
        Garson Çağır
      </button>
    </div>
  </header>

  <div class="scroll-area">
    <div class="cat-scroll" id="catScroll"></div>

    <div class="section-header">
      <div class="section-title">
        <span id="sectionIcon">🍽️</span> <span id="sectionTitle">Menü</span>
      </div>
      <span class="section-count" id="sectionCount">0 çeşit</span>
    </div>
    
    <div class="menu-grid" id="menuGrid"></div>
  </div>
</div>

<div class="cart-sidebar">
  <div class="cart-header">
    <div class="cart-title">
      <svg style="width:24px;height:24px;fill:currentColor;" viewBox="0 0 24 24"><path d="M19 8h-3V6c0-2.21-1.79-4-4-4S8 3.79 8 6v2H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-9-2c0-1.1.9-2 2-2s2 .9 2 2v2h-4V6zm9 14H5V10h14v10z"/></svg>
      Sipariş Sepeti
    </div>
  </div>
  
  <div class="cart-items-container" id="cartItems">
    <div style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5;">
      <svg style="width:64px;height:64px;fill:var(--text-grey);margin-bottom:15px" viewBox="0 0 24 24"><path d="M19 8h-3V6c0-2.21-1.79-4-4-4S8 3.79 8 6v2H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-9-2c0-1.1.9-2 2-2s2 .9 2 2v2h-4V6zm9 14H5V10h14v10z"/></svg>
      <p style="font-weight:600;font-size:1.1rem;color:var(--text-grey)">Sepetiniz boş</p>
      <p style="font-size:0.9rem;margin-top:5px">Menüden ürün ekleyin</p>
    </div>
  </div>
  
  <div class="cart-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Genel Toplam</span>
      <span class="cart-total-value" id="cartTotal">₺0.00</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="submitOrder()" disabled>Siparişi Gönder</button>
  </div>
</div>

<!-- Table Selection Modal Overlay -->
<div class="overlay" id="tableSelectionOverlay">
  <div class="modal table-modal">
    <div class="modal-inner">
      <div class="icon-wrapper">
        <svg style="width:64px;height:64px;fill:currentColor;" viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm8.42-3.11c-.37-.74-1.12-1.35-1.92-1.63V22h-2.5V4.26c-.8.28-1.55.89-1.92 1.63C12.75 6.55 12.5 7.69 12.5 9v13h2.5V11h3v11h2.5V9c0-1.31-.25-2.45-.58-3.11z"/></svg>
      </div>
      <h2>Masa Seçiniz</h2>
      <p>Lütfen oturduğunuz masanın numarasını girin</p>
      
      <div class="input-group">
        <svg viewBox="0 0 24 24"><path d="M3 3v18h18V3H3zm16 16H5V5h14v14zM7 7h4v4H7V7zm6 0h4v4h-4V7zm-6 6h4v4H7v-4zm6 0h4v4h-4v-4z"/></svg>
        <input type="number" id="tableInput" value="1" min="1" max="100">
      </div>
      
      <div class="table-grid" id="modalTableGrid">
        <!-- 1-16 generated via JS -->
      </div>
      
      <button class="btn-gold-full" onclick="confirmTableSelection()">Masa Seçimini Onayla</button>
      <button class="btn-text" onclick="cancelTableSelection()">İptal ve Geri Dön</button>
    </div>
  </div>
</div>

<!-- Add Item Modal -->
<div class="overlay" id="itemModalOverlay" onclick="closeItemModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalItemName">Ürün Adı</div>
      <button class="close-btn" onclick="closeItemModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-grey);font-size:0.95rem;margin-bottom:12px;font-weight:500">Ürün için notunuz (Opsiyonel)</p>
      <textarea id="modalItemNote" class="note-input" rows="3" placeholder="Örn: Ketçap olmasın, az pişmiş olsun..."></textarea>
      <button class="btn-gold-full" onclick="confirmAddItem()">Sepete Ekle</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/state.js"></script>
<script>
let cart = {};
let tableNumber = null;
let currentItemToAdd = null;
let STATE = getGlobalState();

const catIcons = {
  'Tümü': '🍽️',
  'Döner': '🌯',
  'Kebap': '🥩',
  'Pizza': '🍕',
  'İçecekler': '🥤',
  'Tatlılar': '🍰'
};

function init(){
  const savedTable = localStorage.getItem('customerTable');
  if(savedTable) {
    setTable(savedTable);
  } else {
    showTableSelection();
  }
  
  renderCategories();
  if(STATE.categories.length > 0) {
    selectCategory(STATE.categories[0]); 
  }
  updateCartSidebar();
}

function showTableSelection() {
  const grid = document.getElementById('modalTableGrid');
  grid.innerHTML = '';
  const currentVal = tableNumber || 1;
  document.getElementById('tableInput').value = currentVal;
  
  for(let i=1; i<=16; i++){
    const btn = document.createElement('button');
    btn.className = 'table-btn';
    if(i == currentVal) btn.classList.add('selected');
    btn.textContent = i;
    btn.onclick = function() {
      document.querySelectorAll('.table-btn').forEach(b=>b.classList.remove('selected'));
      this.classList.add('selected');
      document.getElementById('tableInput').value = this.textContent;
    };
    grid.appendChild(btn);
  }
  document.getElementById('tableSelectionOverlay').classList.add('open');
}

function confirmTableSelection() {
  const val = document.getElementById('tableInput').value;
  if(val && val > 0) {
    setTable(val);
    document.getElementById('tableSelectionOverlay').classList.remove('open');
  }
}

function cancelTableSelection() {
  if(!tableNumber) setTable('1'); // fallback
  document.getElementById('tableSelectionOverlay').classList.remove('open');
}

function setTable(t) {
  tableNumber = parseInt(t) || 1;
  localStorage.setItem('customerTable', tableNumber);
  document.getElementById('tableDisplay').textContent = tableNumber;
}

function renderCategories(){
  const scroll = document.getElementById('catScroll');
  scroll.innerHTML = '';
  
  // Add 'Tümü'
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn';
  allBtn.id = 'cat-Tümü';
  allBtn.innerHTML = `<span class="cat-icon">🍽️</span> Tümü`;
  allBtn.onclick = () => selectCategory('Tümü');
  scroll.appendChild(allBtn);
  
  STATE.categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.id = `cat-${c}`;
    let icon = catIcons[c] || '🥘';
    btn.innerHTML = `<span class="cat-icon">${icon}</span> ${c}`;
    btn.onclick = () => selectCategory(c);
    scroll.appendChild(btn);
  });
}

function selectCategory(catName){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  const activeBtn = document.getElementById(`cat-${catName}`);
  if(activeBtn) activeBtn.classList.add('active');
  
  document.getElementById('sectionTitle').innerHTML = `<span id="sectionIcon">${catName === 'Tümü' ? '🍽️' : (catIcons[catName] || '🥘')}</span> ${catName}`;
  
  let items = STATE.products;
  if(catName !== 'Tümü') {
    items = items.filter(i => i.category === catName);
  }
  
  document.getElementById('sectionCount').textContent = `${items.length} çeşit`;
  
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';

  if(items.length === 0){
    grid.innerHTML = '<p style="color:var(--text-grey);font-size:1rem;padding:20px 0;grid-column: 1 / -1;">Bu kategoride ürün bulunamadı.</p>';
    return;
  }

  items.forEach(item => {
    grid.innerHTML += `
      <div class="food-card">
        <img src="${item.img}" alt="${item.name}" class="food-img" onerror="this.src='https://loremflickr.com/600/400/food,meal/all'">
        <div class="food-body">
          <div class="food-name">${item.name}</div>
          <div class="food-desc">${item.desc}</div>
          <div class="food-footer">
            <span class="food-price">₺${parseFloat(item.price).toFixed(2)}</span>
            <button class="add-btn" onclick="openItemModal(${item.id}, '${item.name.replace(/'/g,"\\'")}', ${item.price})">
              <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
          </div>
        </div>
      </div>
    `;
  });
}

function openItemModal(id, name, price){
  currentItemToAdd = {id, name, price};
  document.getElementById('modalItemName').textContent = name;
  document.getElementById('modalItemNote').value = '';
  document.getElementById('itemModalOverlay').classList.add('open');
}
function closeItemModal(e){
  if(!e || e.target.id === 'itemModalOverlay') {
    document.getElementById('itemModalOverlay').classList.remove('open');
  }
}
function confirmAddItem(){
  const note = document.getElementById('modalItemNote').value.trim();
  const {id, name, price} = currentItemToAdd;
  
  const cartId = id + (note ? `_${note}` : ''); 
  if(cart[cartId]){
    cart[cartId].qty++;
  } else {
    cart[cartId] = {id, name, price, qty:1, note};
  }
  
  closeItemModal();
  updateCartSidebar();
  showToast(`${name} eklendi`);
}

function updateCartSidebar(){
  const container = document.getElementById('cartItems');
  const items = Object.values(cart);
  
  if(!items.length){ 
    container.innerHTML = `
      <div style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5;">
        <svg style="width:64px;height:64px;fill:var(--text-grey);margin-bottom:15px" viewBox="0 0 24 24"><path d="M19 8h-3V6c0-2.21-1.79-4-4-4S8 3.79 8 6v2H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-9-2c0-1.1.9-2 2-2s2 .9 2 2v2h-4V6zm9 14H5V10h14v10z"/></svg>
        <p style="font-weight:600;font-size:1.1rem;color:var(--text-grey)">Sepetiniz boş</p>
        <p style="font-size:0.9rem;margin-top:5px;color:var(--text-grey)">Menüden ürün ekleyin</p>
      </div>`;
    document.getElementById('cartTotal').textContent = `₺0.00`;
    document.getElementById('checkoutBtn').disabled = true;
    return; 
  }
  
  let html = '';
  let total = 0;
  
  for(let key in cart){
    const item = cart[key];
    total += item.price * item.qty;
    html += `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          ${item.note ? `<div class="cart-item-note">Not: ${item.note}</div>` : ''}
        </div>
        <div class="qty-ctrl">
          <button onclick="changeQty('${key}',-1)">-</button>
          <span>${item.qty}</span>
          <button onclick="changeQty('${key}',1)">+</button>
        </div>
        <div class="item-price">₺${(item.price*item.qty).toFixed(2)}</div>
      </div>
    `;
  }
  container.innerHTML = html;
  document.getElementById('cartTotal').textContent = `₺${total.toFixed(2)}`;
  document.getElementById('checkoutBtn').disabled = false;
}

function changeQty(key, delta){
  cart[key].qty += delta;
  if(cart[key].qty <= 0) delete cart[key];
  updateCartSidebar();
}

function submitOrder(){
  const items = Object.values(cart);
  if(!items.length) return;
  
  STATE = getGlobalState();
  const orderId = 'ord_' + Date.now();
  STATE.orders.push({
    id: orderId,
    table: parseInt(tableNumber),
    items: items.map(i => ({name:i.name, quantity:i.qty, note:i.note||'', price:i.price})),
    status: 'new',
    timestamp: Date.now()
  });
  saveGlobalState(STATE);

  cart = {};
  updateCartSidebar();
  showToast(`Siparişiniz başarıyla mutfağa iletildi!`);
}

function callWaiter(){
  const btn = document.getElementById('callWaiterBtn');
  if(btn.classList.contains('called')) return;
  
  btn.classList.add('called');
  btn.innerHTML = `<svg style="width:20px;height:20px;fill:currentColor;" viewBox="0 0 24 24"><path d="M19.48 12.35...z"/></svg> Garson Yolda`;
  
  STATE = getGlobalState();
  STATE.calls[tableNumber] = Date.now();
  saveGlobalState(STATE);
  
  showToast('Garson masanıza yönlendirildi.');
  
  setTimeout(() => {
    btn.classList.remove('called');
    btn.innerHTML = `<svg style="width:20px;height:20px;fill:currentColor;" viewBox="0 0 24 24"><path d="M20 12.5C20 8.36 16.64 5 12.5 5S5 8.36 5 12.5V19h15v-6.5zm-2 4.5H7v-4.5c0-3.03 2.47-5.5 5.5-5.5s5.5 2.47 5.5 5.5V17z"/><path d="M11.5 2h2v3h-2zM4.15 6.05l2.12-2.12 1.41 1.42L5.56 7.47zM18.44 7.47l-1.41-1.42 2.12-2.12 1.41 1.42z"/></svg> Garson Çağır`;
  }, 30000);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

BC.onmessage = (e) => {
  if(e.data.type === 'STATE_UPDATED') {
    STATE = getGlobalState();
    const active = document.querySelector('.cat-btn.active');
    if(active) {
      let cat = active.id.replace('cat-', '');
      selectCategory(cat);
    }
  }
}

init();
</script>
</body>
</html>
