<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menü – Sipariş Ekranı</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
        :root {
    --bg-gradient: #0F172A;
    --surface: #1E293B;
    --surface-solid: #1E293B;
    --border: #334155;
    --primary: #F59E0B;
    --primary-hover: #D97706;
    --primary-light: rgba(245, 158, 11, 0.15);
    --text: #F8FAFC;
    --muted: #94A3B8;
    --radius: 16px;
    --shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    --gold-glow: 0 0 20px rgba(245, 158, 11, 0.2);
    --secondary: #3B82F6;
    --success: #10B981;
    --warning: #EF4444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Poppins',sans-serif;background:var(--bg-gradient);background-attachment:fixed;color:var(--text);min-height:100vh;overflow-x:hidden}

  header{position:sticky;top:0;z-index:100;background:rgba(15, 23, 42, 0.85);backdrop-filter:blur(15px);
    border-bottom:1px solid var(--border);padding:0 20px;box-shadow:0 5px 20px rgba(92,67,5,0.15)}
  .header-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:70px}
  .header-left{display:flex;align-items:center;gap:15px}
  .back-btn{text-decoration:none;color:var(--primary);font-weight:600;font-size:0.9rem;transition:all 0.2s;display:flex;align-items:center;gap:5px;background:var(--primary-light);padding:6px 12px;border-radius:8px}
  .back-btn:hover{background:var(--primary);color:#0F172A; font-weight:700;}
  .logo{font-family:'Poppins',sans-serif;font-size:1.5rem;font-weight:700;color:var(--primary);text-decoration:none;letter-spacing:1px}
  .table-badge{background:var(--primary-light);padding:6px 16px;border-radius:16px;font-size:0.9rem;font-weight:600;color:var(--primary);border:1px solid var(--border)}

  .call-banner{max-width:1000px;margin:20px auto 0;padding:0 20px}
  .call-btn{width:100%;padding:16px;border-radius:var(--radius);border:none;cursor:pointer;
    background:var(--surface-solid);color:var(--primary);
    font-family:'Poppins',sans-serif;font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:var(--shadow);transition:all 0.3s ease}
  .call-btn:hover{background:var(--primary);color:#0F172A; font-weight:700;;box-shadow:0 15px 30px rgba(92,67,5,0.4)}
  .call-btn.called{background:var(--primary);color:#0F172A; font-weight:700;}
  .call-btn .pulse{width:10px;height:10px;border-radius:50%;background:currentColor;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.5)}}

  .cat-section{max-width:1000px;margin:30px auto 0;padding:0 20px}
  .cat-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
  .cat-scroll::-webkit-scrollbar{display:none}
  .cat-btn{flex-shrink:0;padding:12px 24px;border-radius:12px;border:1px solid var(--border);
    background:var(--surface);color:var(--muted);cursor:pointer;font-family:'Poppins',sans-serif;
    font-size:0.95rem;font-weight:600;transition:all 0.3s ease;box-shadow:0 4px 10px rgba(92,67,5,0.1)}
  .cat-btn.active{background:var(--primary);color:#0F172A; font-weight:700;;border-color:#B8860B;box-shadow:0 8px 20px rgba(138,100,18,0.3)}
  .cat-btn:hover:not(.active){border-color:var(--primary);color:var(--primary)}

  .menu-section{max-width:1000px;margin:30px auto;padding:0 20px 120px}
  .section-title{font-family:'Poppins',sans-serif;font-size:2.2rem;font-weight:800;margin-bottom:20px;color:var(--primary);text-shadow:0 2px 4px rgba(0,0,0,0.8);border-bottom:2px solid rgba(255, 255, 255, 0.05);padding-bottom:10px}
  .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}

  .food-card{background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;transition:all 0.3s ease;box-shadow:var(--shadow)}
  .food-card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(92,67,5,0.3);border-color:var(--primary)}
  .food-img{width:100%;height:220px;object-fit:cover;display:block;border-bottom:1px solid var(--border);background:#0F172A}
  
  .food-body{padding:20px}
  .food-name{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:6px;color:var(--text)}
  .food-desc{font-size:0.9rem;color:var(--muted);line-height:1.5;margin-bottom:20px;min-height:42px;font-weight:500}
  .food-footer{display:flex;align-items:center;justify-content:space-between}
  .food-price{font-weight:700;font-size:1.3rem;color:var(--primary)}
  .add-btn{padding:10px 24px;border-radius:12px;border:none;background:var(--primary-light);color:var(--primary);
    cursor:pointer;font-family:'Poppins',sans-serif;font-weight:600;font-size:0.95rem;transition:all 0.2s}
  .add-btn:hover{background:var(--primary);color:#0F172A; font-weight:700;;box-shadow:0 4px 10px rgba(138,100,18,0.2)}

  .cart-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15, 23, 42, 0.95);backdrop-filter:blur(15px);
    border-top:1px solid var(--border);padding:16px 20px;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);z-index:200;box-shadow:0 -10px 30px rgba(92,67,5,0.2)}
  .cart-bar.visible{transform:translateY(0)}
  .cart-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
  .cart-info{display:flex;flex-direction:column}
  .cart-count{font-size:0.95rem;color:var(--muted);font-weight:600}
  .cart-total{font-size:1.5rem;font-weight:800;color:var(--primary)}
  .checkout-btn{padding:14px 32px;background:var(--primary);color:#0F172A; font-weight:700;;border:none;border-radius:12px;cursor:pointer;
    font-weight:700;font-size:1.05rem;font-family:'Poppins',sans-serif;transition:all 0.3s;box-shadow:0 8px 20px rgba(184,134,11,0.3)}
  .checkout-btn:hover{background:var(--primary-hover);transform:translateY(-2px)}

  .overlay{position:fixed;inset:0;background:rgba(42,30,0,0.6);backdrop-filter:blur(8px);z-index:300;
    display:none;align-items:center;justify-content:center}
  .overlay.open{display:flex}
  .modal{background:var(--surface-solid);border-radius:16px;width:100%;max-width:450px;max-height:85vh;overflow-y:auto;padding:30px;position:relative;box-shadow:0 25px 50px rgba(92,67,5,0.4);border:1px solid var(--border)}
  
  .modal-title{font-family:'Poppins',sans-serif;font-size:1.6rem;font-weight:800;color:var(--primary);margin-bottom:10px}
  .close-btn{position:absolute;top:25px;right:25px;background:var(--primary-light);border:none;width:36px;height:36px;border-radius:50%;color:var(--primary);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
  .close-btn:hover{background:var(--primary);color:#0F172A; font-weight:700;}

  .note-input{width:100%;padding:14px;background:rgba(255, 255, 255, 0.05);border:2px solid var(--border);color:var(--text);
    font-family:'Poppins',sans-serif;font-size:0.95rem;margin:15px 0;border-radius:12px;outline:none;resize:vertical;transition:border-color 0.2s;font-weight:500}
  .note-input:focus{border-color:var(--primary)}
  .action-btn{width:100%;padding:16px;background:var(--primary);color:#0F172A; font-weight:700;;border:none;cursor:pointer;
    font-family:'Poppins',sans-serif;font-weight:700;font-size:1.05rem;border-radius:12px;margin-top:10px;transition:background 0.3s;box-shadow:0 5px 15px rgba(184,134,11,0.2)}
  .action-btn:hover{background:var(--primary-hover)}

  .order-item{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid var(--border)}
  .order-item-info{flex:1}
  .order-item-name{font-weight:700;font-size:1.05rem;color:var(--text)}
  .order-item-note{font-size:0.85rem;color:var(--primary);margin-top:4px;font-weight:600}
  .qty-ctrl{display:flex;align-items:center;gap:12px;background:var(--primary-light);border-radius:16px;padding:6px 14px;margin:0 15px}
  .qty-ctrl button{background:none;border:none;color:var(--primary);font-size:1.2rem;font-weight:700;cursor:pointer}
  .item-price{font-weight:700;min-width:75px;text-align:right;color:var(--primary);font-size:1.1rem}
  
  .table-select{width:100%;padding:14px;background:rgba(255, 255, 255, 0.05);border:2px solid var(--border);color:var(--text);
    margin:20px 0;border-radius:12px;outline:none;font-family:'Poppins',sans-serif;font-weight:600;font-size:1rem}

  .toast{position:fixed;top:20px;right:20px;background:var(--primary);color:#0F172A; font-weight:700;;padding:16px 24px;
    border-radius:12px;font-weight:600;z-index:9999;transform:translateX(150%);transition:transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow:0 10px 30px rgba(92,67,5,0.4)}
  .toast.show{transform:translateX(0)}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <a href="/" class="back-btn">← Ana Sayfa</a>
      <div class="logo">RESTORAN</div>
    </div>
    <div class="table-badge">Masa <strong id="tableDisplay">?</strong></div>
  </div>
</header>

<div class="call-banner">
  <button class="call-btn" id="callWaiterBtn" onclick="callWaiter()">
    <div class="pulse"></div>
    Garson Çağır
  </button>
</div>

<div class="cat-section">
  <div class="cat-scroll" id="catScroll"></div>
</div>

<div class="menu-section">
  <h2 class="section-title" id="sectionTitle">Menü</h2>
  <div class="menu-grid" id="menuGrid"></div>
</div>

<div class="cart-bar" id="cartBar">
  <div class="cart-inner">
    <div class="cart-info">
      <span class="cart-count" id="cartCount">0 Ürün</span>
      <span class="cart-total" id="cartTotal">₺0.00</span>
    </div>
    <button class="checkout-btn" onclick="openCartModal()">Siparişi Tamamla</button>
  </div>
</div>

<div class="overlay" id="itemModalOverlay" onclick="closeItemModal(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeItemModal()">✕</button>
    <h3 class="modal-title" id="modalItemName">Ürün Adı</h3>
    <p style="color:var(--muted);font-size:0.95rem;font-weight:500;margin-bottom:5px">Ürün için notunuz (Opsiyonel)</p>
    <textarea id="modalItemNote" class="note-input" rows="3" placeholder="Örn: Ketçap olmasın..."></textarea>
    <button class="action-btn" onclick="confirmAddItem()">Sepete Ekle</button>
  </div>
</div>

<div class="overlay" id="cartOverlay" onclick="closeCartModal(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeCartModal()">✕</button>
    <h3 class="modal-title">Siparişiniz</h3>
    <div id="cartItems"></div>
    <select id="tableSelect" class="table-select"></select>
    <div style="display:flex;justify-content:space-between;margin:20px 0;font-size:1.4rem;font-weight:800;color:var(--primary)">
      <span>Toplam:</span>
      <span id="modalTotal">₺0.00</span>
    </div>
    <button class="action-btn" onclick="submitOrder()">Siparişi Gönder</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Unified State Manager -->
<script src="/state.js"></script>
<script>
let cart = {};
let tableNumber = '1';
let currentItemToAdd = null;
let STATE = getGlobalState();

function init(){
  tableNumber = localStorage.getItem('customerTable') || '1';
  document.getElementById('tableDisplay').textContent = tableNumber;
  renderCategories();
  if(STATE.categories.length > 0) {
    selectCategory(STATE.categories[0]); 
  }
}

function renderCategories(){
  const scroll = document.getElementById('catScroll');
  scroll.innerHTML = '';
  STATE.categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.id = `cat-${c}`;
    btn.textContent = c;
    btn.onclick = () => selectCategory(c);
    scroll.appendChild(btn);
  });
}

function selectCategory(catName){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  const activeBtn = document.getElementById(`cat-${catName}`);
  if(activeBtn) activeBtn.classList.add('active');
  
  document.getElementById('sectionTitle').textContent = catName;
  
  const items = STATE.products.filter(i => i.category === catName);
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';

  if(items.length === 0){
    grid.innerHTML = '<p style="color:var(--surface-solid);font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,0.2)">Bu kategoride ürün bulunamadı.</p>';
    return;
  }

  items.forEach(item => {
    grid.innerHTML += `
      <div class="food-card">
        <img src="${item.img}" alt="${item.name}" class="food-img" onerror="this.src='https://loremflickr.com/600/400/food,meal/all'">
        <div class="food-body">
          <div class="food-name">${item.name}</div>
          <div class="food-desc">${item.desc}</div>
          <div class="food-footer">
            <span class="food-price">₺${parseFloat(item.price).toFixed(2)}</span>
            <button class="add-btn" onclick="openItemModal(${item.id}, '${item.name.replace(/'/g,"\\'")}', ${item.price})">Ekle</button>
          </div>
        </div>
      </div>
    `;
  });
}

function openItemModal(id, name, price){
  currentItemToAdd = {id, name, price};
  document.getElementById('modalItemName').textContent = name;
  document.getElementById('modalItemNote').value = '';
  document.getElementById('itemModalOverlay').classList.add('open');
}
function closeItemModal(e){
  if(!e || e.target.id === 'itemModalOverlay') {
    document.getElementById('itemModalOverlay').classList.remove('open');
  }
}
function confirmAddItem(){
  const note = document.getElementById('modalItemNote').value.trim();
  const {id, name, price} = currentItemToAdd;
  
  const cartId = id + (note ? `_${note}` : ''); 
  if(cart[cartId]){
    cart[cartId].qty++;
  } else {
    cart[cartId] = {id, name, price, qty:1, note};
  }
  
  closeItemModal();
  updateCartBar();
  showToast(`${name} sepete eklendi`);
}

function updateCartBar(){
  const items = Object.values(cart);
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  const count = items.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').textContent = `${count} Ürün`;
  document.getElementById('cartTotal').textContent = `₺${total.toFixed(2)}`;
  document.getElementById('cartBar').classList.toggle('visible', count>0);
}

function openCartModal(){
  const sel = document.getElementById('tableSelect');
  sel.innerHTML = '';
  for(let i=1; i<=STATE.tables; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = `Masa ${i}`;
    if(i == tableNumber) opt.selected = true;
    sel.appendChild(opt);
  }
  renderCartItems();
  document.getElementById('cartOverlay').classList.add('open');
}
function closeCartModal(e){
  if(!e || e.target.id === 'cartOverlay') document.getElementById('cartOverlay').classList.remove('open');
}

function renderCartItems(){
  const container = document.getElementById('cartItems');
  const items = Object.values(cart);
  if(!items.length){ container.innerHTML='<p style="color:var(--muted);font-weight:600">Sepetiniz boş.</p>'; return; }
  
  let html = '';
  let total = 0;
  
  for(let key in cart){
    const item = cart[key];
    total += item.price * item.qty;
    html += `
      <div class="order-item">
        <div class="order-item-info">
          <div class="order-item-name">${item.name}</div>
          ${item.note ? `<div class="order-item-note">Not: ${item.note}</div>` : ''}
        </div>
        <div class="qty-ctrl">
          <button onclick="changeQty('${key}',-1)">-</button>
          <span>${item.qty}</span>
          <button onclick="changeQty('${key}',1)">+</button>
        </div>
        <div class="item-price">₺${(item.price*item.qty).toFixed(2)}</div>
      </div>
    `;
  }
  container.innerHTML = html;
  document.getElementById('modalTotal').textContent = `₺${total.toFixed(2)}`;
}

function changeQty(key, delta){
  cart[key].qty += delta;
  if(cart[key].qty <= 0) delete cart[key];
  updateCartBar();
  renderCartItems();
}

function submitOrder(){
  const items = Object.values(cart);
  if(!items.length) return;
  const t = document.getElementById('tableSelect').value;
  
  STATE = getGlobalState();
  const orderId = 'ord_' + Date.now();
  STATE.orders.push({
    id: orderId,
    table: parseInt(t),
    items: items.map(i => ({name:i.name, quantity:i.qty, note:i.note||'', price:i.price})),
    status: 'new',
    timestamp: Date.now()
  });
  saveGlobalState(STATE);

  cart = {};
  updateCartBar();
  closeCartModal();
  showToast(`Siparişiniz mutfağa iletildi!`);
  localStorage.setItem('customerTable', t);
  document.getElementById('tableDisplay').textContent = t;
  tableNumber = t;
}

function callWaiter(){
  const btn = document.getElementById('callWaiterBtn');
  if(btn.classList.contains('called')) return;
  
  btn.classList.add('called');
  btn.innerHTML = `<div class="pulse"></div> Garson Bekleniyor`;
  
  STATE = getGlobalState();
  STATE.calls[tableNumber] = Date.now();
  saveGlobalState(STATE);
  
  showToast('Garson masanıza yönlendirildi.');
  
  setTimeout(() => {
    btn.classList.remove('called');
    btn.innerHTML = `<div class="pulse"></div> Garson Çağır`;
  }, 30000);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

BC.onmessage = (e) => {
  if(e.data.type === 'STATE_UPDATED') {
    STATE = getGlobalState();
    renderCategories();
    const active = document.querySelector('.cat-btn.active');
    if(active) selectCategory(active.textContent);
  }
}

init();
</script>
</body>
</html>
